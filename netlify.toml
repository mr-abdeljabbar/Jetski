[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  external_node_modules = ["pdfkit"]
  included_files = ["api/fonts/**"]

# API redirection to the Netlify Function (MUST BE FIRST)
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api"
  status = 200
  force = true

# SPA redirection for the React frontend (CATCH-ALL)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false
