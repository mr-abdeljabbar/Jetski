[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  node_version = "20"
  output_module = true

# SPA redirection for the React frontend
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false

# API redirection to the Netlify Function
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api"
  status = 200
  force = true
